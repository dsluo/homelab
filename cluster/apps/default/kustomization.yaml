apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
metadata:
  name: default
resources:
  - ./paperless-ngx/controller.yaml
patches:
  - target:
      group: kustomize.toolkit.fluxcd.io
      version: v1
      kind: Kustomization
    patch: |-
      - op: replace
        path: /metadata/namespace
        value: flux-system
      - op: replace
        path: /spec/targetNamespace
        value: default
