---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: victoria-metrics-operator
spec:
  dependsOn:
    # the VM operator watches prometheus-operator CRs (ServiceMonitor,
    # PodMonitor, PrometheusRule, ...) and converts them to VM equivalents
    - name: prometheus-operator-crds
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: victoria-metrics-operator
      namespace: observability
  interval: 1h
  path: ./kubernetes/apps/observability/victoria/operator
  postBuild:
    substituteFrom:
      - name: cluster-secrets
        kind: Secret
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: observability
  wait: true
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app vmks
spec:
  dependsOn:
    - name: victoria-metrics-operator
    - name: grafana-instance
    - name: kopiur-repository
      namespace: kopiur-system
  interval: 1h
  path: ./kubernetes/apps/observability/victoria/k8s-stack
  components:
    - ../../../../components/kopiur
  postBuild:
    substitute:
      APP: *app
      KOPIUR_CAPACITY: 50Gi
      # The mover uid must match the data's actual on-disk ownership: fsGroup
      # does NOT remap a read-only snapshot-clone mount (kubelet skips the
      # chown), so a mismatched mover hits PermissionDenied on any file that
      # isn't world-readable. VMSingle's data is owned 1000:1000 (verified
      # 2026-07-13) with several cache/ dirs not world-readable.
      # TODO: enable useStrictSecurity / set an explicit VMSingle
      # securityContext, and keep this uid in lockstep with it.
      KOPIUR_UID: "1000"
      KOPIUR_GID: "1000"
    substituteFrom:
      - name: cluster-secrets
        kind: Secret
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: observability
  wait: false
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app victoria-logs
spec:
  dependsOn:
    - name: victoria-metrics-operator
    - name: kopiur-repository
      namespace: kopiur-system
  components:
    - ../../../../components/kopiur
  interval: 1h
  path: ./kubernetes/apps/observability/victoria/logs
  postBuild:
    substitute:
      APP: *app
      KOPIUR_CAPACITY: 5Gi
      # VLSingle runs as root but writes world-readable files (0644/0755), so a
      # 65534 mover can read everything today (verified 2026-07-13). fsGroup
      # does NOT remap a read-only snapshot-clone mount — if VL ever writes a
      # non-world-readable file, snapshots fail PermissionDenied and this uid
      # must be revisited.
      # TODO: enable useStrictSecurity / set the VLSingle securityContext to
      # 65534, then this pinning becomes exact.
      KOPIUR_UID: "65534"
      KOPIUR_GID: "65534"
    substituteFrom:
      - name: cluster-secrets
        kind: Secret
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: observability
  wait: false
