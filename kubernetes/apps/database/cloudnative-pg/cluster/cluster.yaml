---
# yaml-language-server: $schema=https://datreeio.github.io/CRDs-catalog/postgresql.cnpg.io/cluster_v1.json
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: postgres
  annotations:
    cnpg.io/skipEmptyWalArchiveCheck: enabled
spec:
  instances: 1
  # single instance on node-local storage: the PDB can never be satisfied (no
  # failover target), so it would deadlock node drains during tuppr upgrades.
  enablePDB: false
  imageName: ghcr.io/cloudnative-pg/postgresql:18@sha256:9f8d4500ed53901dba42907b05fc7520988b347a79b85c8cf2fa1cb460f2e177

  primaryUpdateStrategy: unsupervised
  # switch to switchover when instances > 1
  primaryUpdateMethod: restart

  storage:
    storageClass: openebs-hostpath
    size: 20Gi

  managed:
    services:
      # we're single node anyway
      disabledDefaultServices: ["ro", "r"]
    roles:
      - name: &default app
        login: false
      - name: paperless
        ensure: present
        login: true
        passwordSecret:
          name: paperless-postgres-secret
      - name: sonarr
        ensure: present
        login: true
        passwordSecret:
          name: sonarr-postgres-secret
      - name: radarr
        ensure: present
        login: true
        passwordSecret:
          name: radarr-postgres-secret
      - name: prowlarr
        ensure: present
        login: true
        passwordSecret:
          name: prowlarr-postgres-secret
      - name: pocketid
        ensure: present
        login: true
        passwordSecret:
          name: pocketid-postgres-secret
      - name: seerr
        ensure: present
        login: true
        passwordSecret:
          name: seerr-postgres-secret

  plugins:
    - name: barman-cloud.cloudnative-pg.io
      enabled: true
      isWALArchiver: true
      parameters:
        # WALs + primary (PITR-capable) base backups go to Backblaze B2.
        barmanObjectName: backblaze

  bootstrap:
    # initdb:
    #   database: *default
    #   owner: *default
    recovery:
      database: *default
      owner: *default
      source: backblaze

  externalClusters:
    # recovery.source picks one of these; the others are just available targets
    # to flip to (e.g. recover from garage before B2 has its first backup).
    - name: backblaze
      plugin:
        name: barman-cloud.cloudnative-pg.io
        parameters:
          barmanObjectName: backblaze
          serverName: postgres
    - name: garage
      plugin:
        name: barman-cloud.cloudnative-pg.io
        parameters:
          barmanObjectName: garage
          serverName: postgres

  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      memory: 1Gi

  monitoring:
    enablePodMonitor: true
