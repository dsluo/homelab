---
# yaml-language-server: $schema=https://github.com/games-on-whales/fenrir/raw/refs/heads/main/schemas/direwolf.games-on-whales.github.io/user_v1alpha1.json
apiVersion: direwolf.games-on-whales.github.io/v1alpha1
kind: User
metadata:
  # Upstream currently hardcodes the "alex" username; do not rename.
  name: alex
spec:
  resources:
    limits:
      nvidia.com/gpu: "1"
      memory: 8G
    requests:
      nvidia.com/gpu: "1"
      memory: 8G
  # wolf:stable must start as root: its supervisord.conf has user=root and
  # drops privileges per-program itself, but the operator hardcodes
  # PUID=1000/UNAME=ubuntu into the wolf container, so the GOW entrypoint
  # gosu's to a non-root user before supervisord runs -> "Can't drop privilege
  # as nonroot user" crash loop. Shadow /entrypoint.sh with a wrapper that
  # forces root and skips gosu (see wolf-entrypoint.yaml). Do NOT instead set
  # PUID/PGID/UNAME in the policy env: the operator builds the Deployment with
  # server-side apply and env is a listType=map keyed by name, so duplicate
  # names are rejected and the session Deployment is never created.
  volumes:
    - name: wolf-root-entrypoint
      configMap:
        name: wolf-root-entrypoint
        defaultMode: 0755
    # Pod-local udev database shared between the wolf-agent (writer) and the
    # app container (reader). The agent plays wolf's fake-udev role.
    - name: udev-data
      emptyDir: {}
  sidecarPolicies:
    wolf:
      env:
        - name: NVIDIA_DRIVER_CAPABILITIES
          value: all
        - name: NVIDIA_VISIBLE_DEVICES
          value: all
        # The gpu-operator (CDI mode) injects the driver under /usr/local/lib
        # and creates the GBM backend symlink at /usr/local/lib/gbm/, but the
        # image's Mesa libgbm only searches /usr/lib/x86_64-linux-gnu/gbm.
        # Without the nvidia backend, waylanddisplaysrc cannot allocate
        # DMA-BUFs ("Failed to create GsCUDABuf" panic -> no video stream).
        - name: GBM_BACKENDS_PATH
          value: /usr/local/lib/gbm:/usr/lib/x86_64-linux-gnu/gbm
      volumeMounts:
        - name: wolf-root-entrypoint
          mountPath: /entrypoint.sh
          subPath: entrypoint.sh
      # NOTE: unlike shrinedogg's cluster this does not request squat.ai/uinput
      # (no generic-device-plugin here). Wolf still encodes video without it;
      # virtual-input/controller hotplug needs /dev/uinput on the node (uinput
      # kernel module + device access) -- a follow-up, see README.
      #
      # Request BOTH of talos1's GPUs (node exposes nvidia.com/gpu: 2, no
      # time-slicing). CDI injects each allocated GPU's DRM render node at its
      # host numbering, so taking both guarantees BOTH renderD128 (RTX 3090 Ti,
      # 01:00.0) and renderD129 (RTX 3070, 0f:00.0) are present in the wolf
      # container. With only one GPU the scheduler picks either card
      # non-deterministically, so a hardcoded renderNode (renderD128) is absent
      # ~half the time and wolf silently falls back to software x264. Taking
      # both makes renderNode: /dev/dri/renderD128 always valid.
      #
      # Trade-off: this consumes the whole node, so an App that also needs a GPU
      # for its own container (e.g. firefox: nvidia.com/gpu 1) can't schedule
      # alongside (1 + 2 > 2). Test Ball has no app container, so it's fine.
      # Revisit with GPU time-slicing if concurrent app+wolf GPU use is needed.
      resources:
        requests:
          nvidia.com/gpu: "2"
        limits:
          nvidia.com/gpu: "2"
    wolfAgent:
      volumeMounts:
        - name: udev-data
          mountPath: /run/udev
      securityContext:
        # Broadcasting synthetic libudev netlink events (fake-udev) requires
        # CAP_NET_ADMIN in the pod's network namespace.
        capabilities:
          add: ["NET_ADMIN"]
