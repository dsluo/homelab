---
apiVersion: operator.victoriametrics.com/v1
kind: VLSingle
metadata:
  name: victoria-logs-single
spec:
  retentionPeriod: "7d"
  storageDataPath: /victoria-logs-data
  volumes:
    - name: data
      persistentVolumeClaim:
        claimName: "${APP}"
  volumeMounts:
    - name: data
      mountPath: /victoria-logs-data
