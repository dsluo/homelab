---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ./grafanadashboard.yaml
  - ./helmrelease.yaml
  - ./ocirepository.yaml

configMapGenerator:
  - name: kepler-grafana-dashboard
    files:
      - dashboards/kepler.json
    options:
      disableNameSuffixHash: true
