# yaml-language-server: $schema=https://raw.githubusercontent.com/aclerici38/pocket-id-operator/refs/heads/main/dist/schemas/pocketidinstance_v1alpha1.json
apiVersion: pocketid.internal/v1alpha1
kind: PocketIDInstance
metadata:
  name: pocket-id
spec:
  annotations:
    reloader.stakater.com/auto: "true"
  image: ghcr.io/pocket-id/pocket-id:v2.4.0-distroless@sha256:e3e0fa59d06f6651448766e279077929694a644865759264f941a700f67d13eb
  versionCheckDisabled: true
  env:
    - name: TZ
      value: America/Detroit

  analyticsDisabled: true

  encryptionKey:
    valueFrom:
      secretKeyRef:
        name: pocket-id-secret
        key: ENCRYPTION_KEY
  databaseUrl:
    valueFrom:
      secretKeyRef:
        name: pocket-id-secret
        key: databaseUrl
  hostUsers: true
  fileBackend: database

  persistence:
    enabled: false

  logging:
    level: info
    json: false
  # todo: service monitor for this
  metrics:
    enabled: true

  auditLogRetentionDays: 180

  appUrl: "https://pocket-id.${SECRET_DOMAIN}"
  route:
    enabled: true
    parentRefs:
      - name: envoy-external
        namespace: network
    hostnames: ["pocket-id.${SECRET_DOMAIN}"]
