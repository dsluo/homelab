---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app orcaslicer
spec:
  chartRef:
    kind: OCIRepository
    name: *app
  interval: 1h
  values:
    controllers:
      *app :
        annotations:
          reloader.stakater.com/auto: "true"
        pod:
          securityContext:
            supplementalGroups: [4003]
          resourceClaims:
            - name: gpu
              resourceClaimTemplateName: orcaslicer
        containers:
          *app :
            image:
              repository: ghcr.io/linuxserver/orcaslicer
              tag: 2.3.1@sha256:4e361058599c6dd5139487c00d1b38af130744cf941303bf322e8720cb7619b1
            env:
              TZ: America/Detroit
              PIXELFLUX_WAYLAND: "true"
              DRINODE: &gpu /dev/dri/renderD128
              DRI_NODE: *gpu
              # S6_READ_ONLY_ROOT: "1"
              PUID: 911
              PGID: 911
            securityContext:
              allowPrivilegeEscalation: false
              # readOnlyRootFilesystem: true
            resources:
              claims:
                - name: gpu

    service:
      *app :
        ports:
          http:
            port: &port 3000
    route:
      *app :
        hostnames:
          - "orcaslicer.${SECRET_DOMAIN}"
        parentRefs:
          - name: envoy-internal
            namespace: network
        rules:
          - backendRefs:
              - identifier: *app
                port: *port
    persistence:
      config:
        existingClaim: *app
        globalMounts:
          - path: /config/.config/OrcaSlicer
            subPath: orcaslicer
          - path: /config/Desktop
            subPath: models
      shm:
        type: emptyDir
        medium: Memory
        sizeLimit: 1Gi
        globalMounts:
          - path: /dev/shm
      tmpfs:
        type: emptyDir
        globalMounts:
          - path: /run
            subPath: run
          - path: /tmp
            subPath: tmp
          - path: /config
            subPath: config
          - path: /config/.config/OrcaSlicer/log
            subPath: log
          - path: /config/.config/OrcaSlicer/cache
            subPath: cache
