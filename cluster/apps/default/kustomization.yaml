apiVersion: kustomize.config.k8s.io/v1
kind: Kustomization
metadata:
  name: default
resources:
  - ./paperless-ngx
patches:
  - target:
      group: kustomize.toolkit.fluxcd.io
      version: v1
      kind: Kustomization
    patch: |-
      - op: replace
        path: /spec/targetNamespace
        value: default
  - target:
      group: helm.toolkit.fluxcd.io
      version: v1
      kind: HelmRelease
    patch: |-
      - op: replace
        path: /spec/targetNamespace
        value: default
