version: "3"

tasks:
  network:
    cmds:
      - ansible-playbook playbooks/network.yaml -K
  install:
    cmds:
      - ansible-playbook playbooks/k3s-install.yaml -K
  nuke:
    cmds:
      - ansible-playbook playbooks/k3s-nuke.yaml -K

  kubeconfig:
    cmds:
      - >
        ansible k0
        -m ansible.builtin.fetch
        -a 'src=/etc/rancher/k3s/k3s.yaml dest=~/.kube/config flat=true'
        --become -K
