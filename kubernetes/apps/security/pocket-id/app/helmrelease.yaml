---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: pocket-id
spec:
  chartRef:
    kind: OCIRepository
    name: pocket-id
  interval: 1h
  values:
    controllers:
      pocket-id:
        strategy: RollingUpdate
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          pocket-id:
            image:
              repository: ghcr.io/pocket-id/pocket-id
              tag: v2.3.0@sha256:3e3714a7efe20ade573c77844955ce3d096455f8b1f888068ec32a874792f781
              pullPolicy: IfNotPresent
            envFrom:
              - secretRef:
                  name: pocket-id-secret
            env:
              APP_URL: https://pocket-id.${SECRET_DOMAIN}
              TRUST_PROXY: true
              TZ: America/Detroit
              METRICS_ENABLED: "true"
              # OTEL_EXPORTER_<whatever> # todo
            probes:
              liveness:
                enabled: true
                # todo: figure out how app-template does this
                # custom: true
                # spec:
                #   httpGet:
                #     path: /health
                #     port: &port 1411
    persistence:
      data:
        existingClaim: "${APP}"
        globalMounts:
          - path: /app/data
    route:
      pocket-id:
        hostnames:
          - "pocket-id.${SECRET_DOMAIN}"
        parentRefs:
          - name: envoy-internal
            namespace: network
        rules:
          - backendRefs:
              - port: &port 1411
                name: pocket-id
    service:
      pocket-id:
        controller: pocket-id
        ports:
          http:
            port: *port
