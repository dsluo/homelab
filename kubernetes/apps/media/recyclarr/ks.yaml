---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app recyclarr
spec:
  dependsOn:
    - name: kopiur-repository
      namespace: kopiur-system
  components:
    - ../../../../components/kopiur
  interval: 1h
  path: ./kubernetes/apps/media/recyclarr/app
  postBuild:
    substitute:
      APP: *app
      KOPIUR_CAPACITY: 1Gi
      KOPIUR_UID: "1000"
      KOPIUR_GID: "1000"
    substituteFrom:
      - name: cluster-secrets
        kind: Secret
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: media
  wait: false
