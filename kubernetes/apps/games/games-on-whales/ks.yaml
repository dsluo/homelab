---
# CRDs are published in the upstream/fork repo, not in the Helm chart, so they
# are applied from a dedicated GitRepository (pinned for reproducibility).
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: fenrir
spec:
  interval: 1h
  url: https://github.com/shrinedogg/fenrir
  ref:
    commit: fd91750567dc038b0f608bd86be7bb335601aab0
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: fenrir-crds
spec:
  interval: 1h
  retryInterval: 1m
  timeout: 5m
  path: ./crds
  prune: true
  wait: true
  force: true # Apps/Users CRDs embed full PodSpec schemas; replace on change
  sourceRef:
    kind: GitRepository
    name: fenrir
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app games-on-whales
spec:
  interval: 1h
  path: ./kubernetes/apps/games/games-on-whales/app
  prune: true
  wait: false
  targetNamespace: games
  dependsOn:
    - name: fenrir-crds
  postBuild:
    substitute:
      APP: *app
    substituteFrom:
      - name: cluster-secrets
        kind: Secret
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
