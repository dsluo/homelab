---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: intel-gpu
spec:
  instanceSelector:
    matchLabels:
      dashboards: "grafana"
  allowCrossNamespaceImport: true
  resyncPeriod: 1h
  configMapRef:
    name: intel-gpu-exporter-dashboard
    key: intel-gpu.json
