---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ./helmrelease.yaml
  - ./ocirepository.yaml
  - ./resourceclaimtemplate.yaml
  - ./secret.sops.yaml
  - ./servicemonitor.yaml
configMapGenerator:
  - name: llama-cpp-config
    files:
      - ./resources/presets.ini
  - name: llama-cpp-download-script
    files:
      - ./resources/download-model.sh
generatorOptions:
  disableNameSuffixHash: true
