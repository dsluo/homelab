---
# reference: https://github.com/onedr0p/cluster-template/blob/main/templates/config/bootstrap/helmfile.d/00-crds.yaml.j2

# This helmfile is for extracting and installing Custom Resource Definitions (CRDs) from Helm charts.
# It is not intended to be used with helmfile apply or helmfile sync.

helmDefaults:
  args:
    - --include-crds
    - --no-hooks
releases:
  - name: cloudflare-dns
    namespace: network
    chart: oci://ghcr.io/home-operations/charts-mirror/external-dns
    version: 1.21.1

  - name: envoy-gateway
    namespace: network
    chart: oci://mirror.gcr.io/envoyproxy/gateway-helm
    version: v1.8.2

  # pre-seeds the monitoring.coreos.com CRDs so first reconcile is clean;
  # steady-state they're owned by the prometheus-operator-crds HelmRelease
  # in kubernetes/apps/observability/
  - name: prometheus-operator-crds
    namespace: observability
    chart: oci://ghcr.io/prometheus-community/charts/prometheus-operator-crds
    version: 30.0.1
