---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app continuwuity
spec:
  dependsOn:
    - name: kopiur-repository
      namespace: kopiur-system
  components:
    - ../../../../components/kopiur
  interval: 1h
  path: ./kubernetes/apps/social/continuwuity/app
  postBuild:
    substitute:
      APP: *app
      KOPIUR_CAPACITY: 5Gi
      KOPIUR_UID: "1001"
      KOPIUR_GID: "1001"
    substituteFrom:
      - name: cluster-secrets
        kind: Secret
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: social
  wait: false
