---
apiVersion: inference.llmkube.dev/v1alpha1
kind: Model
metadata:
  name: qwen3-6-27b-mtp
spec:
  # HF cache path models--unsloth--Qwen3.6-27B-MTP-GGUF / Qwen3.6-27B-UD-Q4_K_XL.gguf
  source: https://huggingface.co/unsloth/Qwen3.6-27B-MTP-GGUF/resolve/main/Qwen3.6-27B-UD-Q4_K_XL.gguf
  format: gguf
  quantization: UD-Q4_K_XL
  hardware:
    accelerator: cuda
    gpu:
      enabled: true
      count: 2 # 3090 Ti + 3070 on talos1
      vendor: nvidia
      layers: 999 # preset ngl=999 (full offload)
      # Emit a single --tensor-split 6,1 (preset value). llmkube derives the
      # ratio from the layerSplit range sizes (6 vs 1), so we must NOT also pass
      # --tensor-split in extraArgs or llama.cpp gets it twice. The ranges only
      # express the 6:1 proportion; they need not match the real layer count.
      sharding:
        strategy: layer
        layerSplit:
          - "0-5" # 3090 Ti — 6 parts
          - "6-6" # 3070 — 1 part
---
apiVersion: inference.llmkube.dev/v1alpha1
kind: InferenceService
metadata:
  name: qwen3-6-27b-mtp
spec:
  modelRef: qwen3-6-27b-mtp
  runtime: llamacpp
  image: ghcr.io/ggml-org/llama.cpp:server-cuda-b9744@sha256:f8f4bb64edbf26d369b75c01059663ba749c9893006a7aef5838e5f705319d76
  runtimeClassName: nvidia
  replicas: 1
  # NOTE: GPU handoff to games-on-whales is MANUAL on this branch -- scale this
  # InferenceService to 0 before gaming and back to 1 afterward
  # (kubectl -n ai scale inferenceservice qwen3-6-27b-mtp --replicas=0). No
  # PriorityClass preemption here; see issue #1109 and
  # kubernetes/apps/games/games-on-whales/README.md.

  # --- typed preset fields ---
  contextSize: 262144 # ctx-size
  parallelSlots: 2 # parallel
  batchSize: 2048 # batch-size
  uBatchSize: 256 # ubatch-size — halved from 512 to shrink the per-context
  # compute buffer on the 3070. The 3070 holds TWO compute buffers (main +
  # MTP draft context), allocated sequentially; at 512 (and even 384) the
  # second one OOMs. 256 is the ceiling that fits full 262144 ctx + MTP here.
  cacheTypeK: q8_0 # cache-type-k
  cacheTypeV: q8_0 # cache-type-v

  # --- preset flags without typed CRD fields (MTP draft, KV reuse, sampling) ---
  # Omitted from the preset: load-on-startup (router-only).
  # --tensor-split 6,1 is emitted by the Model's gpu.sharding (above), not here.
  extraArgs:
    - --alias
    - Qwen/Qwen3.6-27B-MTP
    - --verbosity
    - "4"
    - --cache-reuse
    - "256"
    - --kv-unified
    - --spec-type
    - draft-mtp
    - --spec-draft-n-max
    - "3"
    - --spec-draft-ngl
    - "999"
    - --spec-draft-type-k
    - q8_0
    - --spec-draft-type-v
    - q8_0
    - --temp
    - "0.6"
    - --top-p
    - "0.95"
    - --top-k
    - "20"
    - --min-p
    - "0.0"
    - --presence-penalty
    - "0.0"
    - --repeat-penalty
    - "1.0"
    - --chat-template-kwargs
    - '{"preserve_thinking":true}'

  resources:
    cpu: "1"
    memory: 8Gi
    # Request all 8 logical GPUs (= 2 physical cards x 4 time-slicing replicas;
    # see kubernetes/apps/kube-system/nvidia-gpu/operator/helmrelease.yaml). This
    # is the k8s SCHEDULING request only -- the model still runs on the 2 physical
    # cards via hardware.gpu.count + the 6:1 --tensor-split above (the 8 slices
    # dedupe to the 2 physical UUIDs for CUDA). Grabbing all 8 keeps every other
    # GPU pod off qwen's cards (no shared-VRAM contention) and guarantees qwen
    # lands on BOTH full cards (no 2-slices-on-one-card OOM). GPU handoff to
    # games-on-whales is MANUAL -- scale this InferenceService to 0 first (see
    # README / issue #1109). Bump this if the node's GPU count or replicas change.
    gpu: 8

  endpoint:
    port: 8080
    type: ClusterIP
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: qwen3-6-27b-mtp
spec:
  hostnames:
    - "qwen.${SECRET_DOMAIN}"
  parentRefs:
    - name: envoy-internal
      namespace: network
  rules:
    - backendRefs:
        - name: qwen3-6-27b-mtp
          port: 8080
