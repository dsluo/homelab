---
# Negative priority so GPU-holding LLM inference yields to default-priority
# (0) pods such as the games-on-whales Wolf streaming sessions. When a game
# session pod requests nvidia.com/gpu and both GPUs are held by llmkube, the
# scheduler preempts this lower-priority pod to free a GPU; llmkube reschedules
# (and reloads the model) once the session ends. The Fenrir operator cannot set
# a priorityClassName on the session pods it generates (the User CRD only
# exposes resources/volumes/sidecar policies), so the lever lives here on the
# consumer side rather than on the session.
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: gpu-preemptible
value: -100
globalDefault: false
preemptionPolicy: PreemptLowerPriority
description: >-
  GPU inference workloads that game-streaming sessions may preempt when GPUs
  are contended on talos1.
