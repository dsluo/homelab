---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/toolhive.stacklok.dev/mcpserver_v1alpha1.json
apiVersion: toolhive.stacklok.dev/v1alpha1
kind: MCPServer
metadata:
  name: mcp-searxng
spec:
  image: docker.io/isokoliuk/mcp-searxng:1.3.3@sha256:83c07ac0ab64c134b73917fc4fee19084ca5db6e63d7e3f67f87d5cdf8ad1982
  transport: streamable-http
  proxyPort: 8080
  env:
    - name: TZ
      value: America/Detroit
    - name: SEARXNG_URL
      value: http://searxng.ai.svc.cluster.local:8080
    - name: MCP_HTTP_PORT
      value: "8080"
    - name: MCP_HTTP_HOST
      value: "0.0.0.0"
  podTemplateSpec:
    spec:
      containers:
        - name: mcp
          resources:
            requests:
              cpu: 10m
              memory: 128Mi
            limits:
              memory: 256Mi
