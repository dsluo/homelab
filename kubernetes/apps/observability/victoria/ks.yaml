---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: victoria-metrics-operator
spec:
  dependsOn:
    # the VM operator watches prometheus-operator CRs (ServiceMonitor,
    # PodMonitor, PrometheusRule, ...) and converts them to VM equivalents
    - name: prometheus-operator-crds
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: victoria-metrics-operator
      namespace: observability
  interval: 1h
  path: ./kubernetes/apps/observability/victoria/operator
  postBuild:
    substituteFrom:
      - name: cluster-secrets
        kind: Secret
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: observability
  wait: true
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app vmks
spec:
  dependsOn:
    - name: victoria-metrics-operator
    - name: grafana-instance
    - name: kopiur-repository
      namespace: kopiur-system
  interval: 1h
  path: ./kubernetes/apps/observability/victoria/k8s-stack
  components:
    - ../../../../components/kopiur
  postBuild:
    substitute:
      APP: *app
      KOPIUR_CAPACITY: 50Gi
      # These values set both VMSingle's runtime uid/gid and the kopiur mover
      # identity. Keep them in lockstep: kubelet does not fsGroup-remap a
      # read-only snapshot clone, so the mover needs the data owner's ids.
      KOPIUR_UID: "1000"
      KOPIUR_GID: "1000"
    substituteFrom:
      - name: cluster-secrets
        kind: Secret
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: observability
  wait: false
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app victoria-logs
spec:
  dependsOn:
    - name: victoria-metrics-operator
    - name: kopiur-repository
      namespace: kopiur-system
  components:
    - ../../../../components/kopiur
  interval: 1h
  path: ./kubernetes/apps/observability/victoria/logs
  postBuild:
    substitute:
      APP: *app
      KOPIUR_CAPACITY: 5Gi
      # These values set both VLSingle's runtime uid/gid and the kopiur mover
      # identity. Keep them in lockstep: kubelet does not fsGroup-remap a
      # read-only snapshot clone, so the mover needs the data owner's ids.
      KOPIUR_UID: "65534"
      KOPIUR_GID: "65534"
    substituteFrom:
      - name: cluster-secrets
        kind: Secret
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: observability
  wait: false
