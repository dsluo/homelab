[env]
'_'.file = { path = ".env" }
KUBECONFIG = "{{config_root}}/kubeconfig"
SOPS_AGE_KEY_CMD = "op read 'op://homelab/kube age key/password'"
TALOSCONFIG = "{{config_root}}/talos/clusterconfig/talosconfig"

[tools]
# utilities
"aqua:casey/just" = "1.56.0"
"aqua:jqlang/jq" = "1.8.1"
"aqua:mikefarah/yq" = "4.53.3"
"aqua:google/go-containerregistry" = "0.21.7"
# talos
"aqua:budimanjojo/talhelper" = "3.1.12"
"aqua:siderolabs/talos" = "1.13.6"
"github:Handfish/talos-pilot" = "0.1.9"
# k8s
"aqua:derailed/k9s" = "0.51.0"
"aqua:helm/helm" = "4.2.3"
"aqua:helmfile/helmfile" = "1.7.0"
"aqua:kubernetes-sigs/kustomize" = "5.8.0"
"aqua:kubernetes/kubectl" = "1.34.3"
"aqua:kubecolor/kubecolor" = "0.6.0"
# task specific
"aqua:utkuozdemir/pv-migrate" = "3.5.0"
# app clis
"aqua:cilium/cilium-cli" = "0.19.5"
"aqua:cloudflare/cloudflared" = "2026.7.1"
"github:cloudnative-pg/cloudnative-pg" = "1.30.0"
# flux
"aqua:FiloSottile/age" = "1.3.1"
"aqua:fluxcd/flux2" = "2.9.1"
"aqua:getsops/sops" = "3.13.2"
# authoring tools
"npm:renovate" = "43.257.5"
"pipx:copier" = { version = "9.16.0", uvx_args = "--with copier-template-extensions" }
# iac
"aqua:gruntwork-io/terragrunt" = "1.1.0"
"aqua:opentofu" = "1.12.3"
"aqua:opentofu/tofu-ls" = "0.5.3"
# ai/mcp
"github:grafana/mcp-grafana" = "0.17.1"
"github:home-operations/flate" = "0.4.10"
