---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: towonel-hub
spec:
  instanceSelector:
    matchLabels:
      dashboards: grafana
  allowCrossNamespaceImport: true
  datasources:
    - datasourceName: VictoriaMetrics
      inputName: DS_PROMETHEUS
  # Pin to your towonel server version running on the VPS.
  url: https://codeberg.org/towonel/towonel/raw/tag/v0.1.27/deploy/grafana/towonel-hub.json
