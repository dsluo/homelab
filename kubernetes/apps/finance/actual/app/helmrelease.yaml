---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app actual
spec:
  chartRef:
    kind: OCIRepository
    name: *app
  interval: 1h
  values:
    controllers:
      ? *app
      : annotations:
          reloader.stakater.com/auto: "true"
        pod:
          securityContext:
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
            runAsGroup: 1000
            runAsUser: 1000
        containers:
          ? *app
          : image:
              repository: ghcr.io/actualbudget/actual
              tag: 26.4.0@sha256:b0e732e2c41b3dc468a71548e88ef76d3f0c157fc43d15fa05d14ec1c5747e1e
            env:
              ACTUAL_PORT: &port 5006
              ACTUAL_LOGIN_METHOD: openid
              ACTUAL_OPENID_DISCOVERY_URL:
                valueFrom:
                  secretKeyRef:
                    name: &oidcSecret actual-oidc-credentials
                    key: OIDC_DISCOVERY_URL
              ACTUAL_OPENID_CLIENT_ID:
                valueFrom:
                  secretKeyRef:
                    name: *oidcSecret
                    key: OIDC_CLIENT_ID
              ACTUAL_OPENID_CLIENT_SECRET:
                valueFrom:
                  secretKeyRef:
                    name: *oidcSecret
                    key: OIDC_CLIENT_SECRET
              ACTUAL_OPENID_SERVER_HOSTNAME: "https://actual.${SECRET_DOMAIN}"
            probes:
              liveness:
                enabled: true
                spec:
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: *port
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 5
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 10
            resources:
              requests:
                cpu: 12m
                memory: 128M
              limits:
                memory: 512M
    service:
      ? *app
      : ports:
          http:
            port: *port
    route:
      ? *app
      : hostnames:
          - "actual.${SECRET_DOMAIN}"
        parentRefs:
          - name: envoy-internal
            namespace: network
        rules:
          - backendRefs:
              - identifier: *app
                port: *port
    persistence:
      data:
        existingClaim: *app
