# yaml-language-server: $schema=https://raw.githubusercontent.com/aclerici38/pocket-id-operator/refs/heads/main/dist/schemas/pocketidinstance_v1alpha1.json
apiVersion: pocketid.internal/v1alpha1
kind: PocketIDInstance
metadata:
  name: pocket-id
spec:
  annotations:
    reloader.stakater.com/auto: "true"
  image: ghcr.io/pocket-id/pocket-id:v2.10.0-distroless@sha256:244c5d2613b1b89b18a8fee07e47e9a43907a09009c6280236131fccf1ba5f9f
  versionCheckDisabled: true
  env:
    - name: TZ
      value: America/Detroit

  analyticsDisabled: true

  encryptionKey:
    valueFrom:
      secretKeyRef:
        name: pocket-id-secret
        key: ENCRYPTION_KEY
  databaseUrl:
    valueFrom:
      secretKeyRef:
        name: pocket-id-secret
        key: databaseUrl
  hostUsers: true
  fileBackend: database

  persistence:
    enabled: false

  logging:
    level: info
    json: false
  # todo: service monitor for this
  metrics:
    enabled: true

  auditLogRetentionDays: 180

  appUrl: "https://pocket-id.${SECRET_DOMAIN}"
  route:
    enabled: true
    parentRefs:
      - name: envoy-cloudflare
        namespace: network
    hostnames: ["pocket-id.${SECRET_DOMAIN}"]

  smtp:
    host: smtp.migadu.com
    port: 465
    tls: tls
    skipCertVerify: false
    from: &from "pocketid@${SECRET_DOMAIN}"
    user: *from
    password:
      valueFrom:
        secretKeyRef:
          name: pocket-id-secret
          key: mailboxPassword

  emailNotifications:
    apiKeyExpiration: true
    loginNotification: true
    oneTimeAccessAsAdmin: true
    oneTimeAccessAsUnauthenticated: false
    verification: true
