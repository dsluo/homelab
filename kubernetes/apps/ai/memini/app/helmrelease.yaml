---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app memini
spec:
  chartRef:
    kind: OCIRepository
    name: *app
  interval: 1h
  values:
    fullnameOverride: *app
    controllers:
      main:
        annotations:
          reloader.stakater.com/auto: "true"
        pod:
          # Pin to the chart's default runtime uid/gid so KOPIUR_UID/GID=65532
          # (ks.yaml) stays anchored to a real in-repo value and can't drift on a
          # chart bump. fsGroup remaps restored data on mount as a fallback.
          # NOTE: this must live under each controller's pod.securityContext, not
          # defaultPodOptions — the chart ships per-controller securityContext and
          # defaultPodOptionsStrategy=overwrite, so a defaultPodOptions value would
          # be silently dropped.
          securityContext: &podSecurityContext
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
            fsGroup: 65532
            fsGroupChangePolicy: OnRootMismatch
        containers:
          main:
            env:
              MEMINI_BACKEND: sqlite
              MEMINI_LOG_FORMAT: json
              MEMINI_EMBED_BASE_URL: http://qwen3-embedding-0-6b.ai.svc.cluster.local:8080/v1
              MEMINI_EMBED_MODEL: Qwen/Qwen3-Embedding-0.6B
              MEMINI_EMBED_DIMS: "1024"
              MEMINI_EMBED_MAX_CONCURRENCY: "2"
              MEMINI_RERANK: http://qwen3-reranker-0-6b.ai.svc.cluster.local:8080/v1
              MEMINI_RERANK_MODEL: Qwen/Qwen3-Reranker-0.6B
              MEMINI_API_KEY:
                valueFrom:
                  secretKeyRef:
                    name: memini-secret
                    key: MEMINI_API_KEY
            resources:
              requests:
                cpu: 25m
                memory: 128Mi
              limits:
                memory: 512Mi
      # The chart's fsck cronjob is disabled by default (not rendered today).
      # Pre-pin it to the same uid/gid so that if it's ever enabled — it can
      # touch the RWO PVC — it can't drift from the main pod or restore mover.
      fsck:
        pod:
          securityContext: *podSecurityContext
    persistence:
      data:
        existingClaim: *app
    route:
      ui:
        enabled: true
        hostnames:
          - "memini.${SECRET_DOMAIN}"
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
