---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kopiur
spec:
  chartRef:
    kind: OCIRepository
    name: kopiur
  interval: 1h
  values:
    features:
      credentialProjection:
        # Third leg of the projection handshake (with `allowed` on the
        # ClusterRepository and `enabled` on each SnapshotPolicy/Restore):
        # grants the operator cluster-wide Secret create/patch/delete RBAC so
        # it can copy the repository credentials into mover namespaces. Off by
        # default in the chart; without it every projected mover fails with an
        # HTTP 403 condition on the CR.
        enabled: true
    monitoring:
      dashboards:
        enabled: true
        grafanaOperator:
          enabled: true
          matchLabels:
            dashboards: grafana
      prometheusRule:
        enabled: true
      serviceMonitor:
        enabled: true
    resources:
      requests:
        cpu: 100m
        # Without an explicit request, Kubernetes copies the 2Gi limit into
        # the request and permanently reserves it on a node.
        memory: 256Mi
      limits:
        memory: 2Gi
    # Controller pod security, pinned to the chart's current defaults so an
    # upstream default change can't silently relax them. The controller never
    # touches the NFS repository in-process here (no extraVolumes), so the
    # locked-down nobody uid is sufficient.
    podSecurityContext:
      runAsNonRoot: true
      runAsUser: 65534
      runAsGroup: 65534
      fsGroup: 65534
      seccompProfile:
        type: RuntimeDefault
    securityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      capabilities:
        drop:
          - ALL
    webhook:
      # Same pin for the webhook pod (its context is separate from the
      # controller's by chart design — root-level keys never reach it).
      podSecurityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      securityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        capabilities:
          drop:
            - ALL
