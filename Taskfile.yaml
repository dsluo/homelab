version: "3"

tasks:
  default: task --list-all

  reconcile:
    desc: Force Flux to pull changes from Git repo.
    cmd: flux --namespace flux-system reconcile kustomization flux-system --with-source

  newapp:
    desc: Generate boilerplate for a new app.
    cmd: copier copy templates . --trust

  test:
    desc: Run flux-local tests
    cmd: flux-local test --enable-helm --all-namespaces --path kubernetes/flux/cluster/ -v