[env]
'_'.file = { path = ".env" }
KUBECONFIG = "{{config_root}}/kubeconfig"
SOPS_AGE_KEY_CMD = "op read 'op://homelab/kube age key/password'"
TALOSCONFIG = "{{config_root}}/talos/clusterconfig/talosconfig"

[tools]
# utilities
"aqua:casey/just" = "1.51.0"
"aqua:jqlang/jq" = "1.8.1"
"aqua:mikefarah/yq" = "4.53.3"
"aqua:google/go-containerregistry" = "0.21.6"
# talos
"aqua:budimanjojo/talhelper" = "3.1.10"
"aqua:siderolabs/talos" = "1.13.3"
"github:Handfish/talos-pilot" = "0.1.9"
# k8s
"aqua:derailed/k9s" = "0.50.18"
"aqua:helm/helm" = "4.2.0"
"aqua:helmfile/helmfile" = "1.5.2"
"aqua:kubernetes-sigs/kustomize" = "5.8.0"
"aqua:kubernetes/kubectl" = "1.34.3"
"aqua:kubecolor/kubecolor" = "0.6.0"
# task specific
"aqua:utkuozdemir/pv-migrate" = "3.5.0"
# app clis
"aqua:cilium/cilium-cli" = "0.19.4"
"aqua:cloudflare/cloudflared" = "2026.5.2"
"github:cloudnative-pg/cloudnative-pg" = "1.29.1"
# flux
"aqua:FiloSottile/age" = "1.3.1"
"aqua:fluxcd/flux2" = "2.8.8"
"aqua:getsops/sops" = "3.13.1"
# authoring tools
"npm:renovate" = "43.214.2"
"pipx:copier" = { version = "9.15.1", uvx_args = "--with copier-template-extensions" }
"pipx:flux-local" = "8.2.0"
# iac
"aqua:gruntwork-io/terragrunt" = "1.0.7"
"aqua:opentofu" = "1.12.1"
"aqua:opentofu/tofu-ls" = "0.5.0"
# ai/mcp
"github:grafana/mcp-grafana" = "0.15.2"
"github:home-operations/flate" = "0.3.2"
