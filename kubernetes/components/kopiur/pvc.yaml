---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: "${APP}"
spec:
  accessModes:
    - "${KOPIUR_ACCESSMODES:=ReadWriteOnce}"
  dataSourceRef:
    kind: Restore
    apiGroup: kopiur.home-operations.com
    name: "${APP}"
  resources:
    requests:
      storage: "${KOPIUR_CAPACITY:=5Gi}"
  storageClassName: "${KOPIUR_STORAGECLASS:=openebs-zfspv}"
