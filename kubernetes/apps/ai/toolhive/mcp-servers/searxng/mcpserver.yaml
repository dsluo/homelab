---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/toolhive.stacklok.dev/mcpserver_v1alpha1.json
apiVersion: toolhive.stacklok.dev/v1alpha1
kind: MCPServer
metadata:
  name: mcp-searxng
spec:
  image: docker.io/isokoliuk/mcp-searxng:1.11.1@sha256:b6727fc950cf1a7501d70f863b563d9fc689d6e33c773296ed845070c5646b48
  transport: streamable-http
  proxyPort: 8080
  env:
    - name: TZ
      value: America/Detroit
    - name: SEARXNG_URL
      value: http://searxng.ai.svc.cluster.local:8080
    - name: MCP_HTTP_PORT
      value: "8080"
    - name: MCP_HTTP_HOST
      value: "0.0.0.0"
  podTemplateSpec:
    spec:
      containers:
        - name: mcp
          resources:
            requests:
              cpu: 10m
              memory: 128Mi
            limits:
              memory: 256Mi
