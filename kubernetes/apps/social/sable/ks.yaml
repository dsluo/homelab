---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app sable
spec:
  
  interval: 1h
  path: ./kubernetes/apps/social/sable/app
  postBuild:
    substitute:
      APP: *app
      
    substituteFrom:
      - name: cluster-secrets
        kind: Secret
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: social
  wait: false
