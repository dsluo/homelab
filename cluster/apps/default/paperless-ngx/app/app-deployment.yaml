apiVersion: apps/v1
kind: Deployment
metadata:
  name: paperless-app
  namespace: default
spec:
  selector:
    matchLabels:
      app: paperless-app
  template:
    metadata:
      labels:
        app: paperless-app
    spec:
      containers:
        - name: paperless-app
          image: ghcr.io/paperless-ngx/paperless-ngx:latest
          resources:
            limits:
              memory: "128Mi"
              cpu: "500m"
          ports:
            - containerPort: 8000
          volumeMounts:
            - name: paperless-data
              mountPath: /usr/src/paperless/data
              subPath: data
            - name: paperless-media
              mountPath: /usr/src/paperless/media
              subPath: media
            - name: paperless-export
              mountPath: /usr/src/paperless/export
              subPath: export
            - name: paperless-consume
              mountPath: /usr/src/paperless/consume
              subPath: consume
          envFrom:
            - configMapRef:
                name: paperless-app-config
            - secretRef:
                name: paperless-postgres-secrets
            - secretRef:
                name: paperless-redis-secrets
          env:
            - name: PAPERLESS_REDIS
              value: redis://:$(REDIS_PASSWORD)@paperless-redis-svc:6379
            - name: PAPERLESS_DBENGINE
              value: postgresql
            - name: PAPERLESS_DBHOST
              value: paperless-postgres-svc
            - name: PAPERLESS_DBNAME
              value: $(POSTGRES_DATABASE)
            - name: PAPERLESS_DBUSER
              value: $(POSTGRES_USERNAME)
            - name: PAPERLESS_DBPASSWORD
              value: $(POSTGRES_PASSWORD)
      volumes:
        - name: paperless-app-pvc
          persistentVolumeClaim:
            claimName: paperless-app-pvc
