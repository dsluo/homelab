---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: games-on-whales
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: direwolf-operator
  # Upstream chart defaults already fit this cluster:
  # - moonlight-proxy LoadBalancer Service with lbipam.cilium.io/sharing-key:
  #   direwolf (Cilium LB-IPAM shares one LB IP between the proxy and the
  #   per-session RTP Services the operator creates)
  # - cert-manager Issuers/Certificates via rawResources (cert-manager is here)
  values:
    # The SNAPSHOT chart bakes a CI image ref ("7/merge") that kubelet rejects
    # (InvalidImageName), so all four images are overridden with shrinedogg's
    # published fork tags (docker.io/shrinedogg/*). See README for what each
    # patch fixes.
    controllers:
      direwolf_operator:
        containers:
          operator:
            image:
              repository: docker.io/shrinedogg/direwolf-operator
              tag: v0.1.0
              digest: sha256:398681deb415a4220fd3c68c6c500dbd2f5251f458be716e8663dd5152516df6
            # The operator's --lb-sharing-key defaults to POD_NAMESPACE
            # ("games"), but the chart annotates the moonlight-proxy Service
            # with sharing-key "direwolf". Mismatched keys make Cilium LB-IPAM
            # hand the per-session RTP Service a different external IP than the
            # proxy, so Moonlight's RTSP handshake to the paired IP times out.
            # Align the key so every session Service shares the proxy's LB IP.
            args:
              - --lb-sharing-key=direwolf
            env:
              AGENT_IMAGE: docker.io/shrinedogg/wolf-agent:v0.1.1@sha256:2427de0eb12634bc4b48346537193cc9b8af033a5ef38a4ccb44879606144ec5
              WOLF_IMAGE: docker.io/shrinedogg/wolf:v0.2.0@sha256:0d9f16d00552928f639e4f000c4ff6efc40b915ac41018514964acb640ce6574
      moonlight_proxy:
        containers:
          proxy:
            image:
              repository: docker.io/shrinedogg/moonlight-proxy
              tag: v0.1.1
              digest: sha256:e8b7cf17ea1bab75c1cec1889a1166ebb3da4c5f0972ae8a7d7cc8dc2571fef0
    service:
      app:
        annotations:
          # Pin the shared Moonlight LB IP from the Cilium pool
          # (10.0.42.128-254). Per-session RTP Services inherit it via the
          # sharing-key above.
          lbipam.cilium.io/sharing-key: direwolf
          lbipam.cilium.io/ips: "10.0.42.135"
          # Preserve the Moonlight client source IP. The cluster default is
          # SNAT, which masquerades the client to a node IP, so the operator
          # reports the wrong client_ip and wolf streams RTP video to a node
          # ("No video received"). DSR keeps the real client IP without changing
          # externalTrafficPolicy, so Cilium LB-IPAM can still share this VIP
          # with the per-session RTP Services (which get the same annotation via
          # ./session-service-policy.yaml). Requires bpf.lbModeAnnotation on the
          # Cilium HelmRelease.
          service.cilium.io/forwarding-mode: dsr
