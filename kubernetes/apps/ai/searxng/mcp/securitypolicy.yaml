---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: searxng-mcp
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: searxng-mcp
  cors:
    allowOrigins:
      - "*"
    allowMethods:
      - DELETE
      - GET
      - POST
      - OPTIONS
    allowHeaders:
      - Accept
      - Content-Type
      - Last-Event-ID
      - Mcp-Protocol-Version
      - Mcp-Session-Id
    exposeHeaders:
      - Mcp-Session-Id
