[env]
'_'.file = { path = ".env" }
KUBECONFIG = "{{config_root}}/kubeconfig"
SOPS_AGE_KEY_CMD = "op read 'op://homelab/kube age key/password'"
TALOSCONFIG = "{{config_root}}/talos/clusterconfig/talosconfig"

LOCAL_FISH_COMPLETE_PATH = "{{config_root}}/.completions/fish"

[hooks.enter]
shell = "fish"
script = """
if not contains -- $LOCAL_FISH_COMPLETE_PATH $fish_complete_path
    set -p fish_complete_path $LOCAL_FISH_COMPLETE_PATH
end
"""

[hooks.leave]
shell = "fish"
script = """
set -l path_index (contains -i $LOCAL_FISH_COMPLETE_PATH $fish_complete_path)
and set -e fish_complete_path[$path_index]
"""

[hooks]
# fyi, this ALWAYS runs using `sh`
postinstall = "{{config_root}}/scripts/gen-completions.sh fish"

[tools]
"aqua:budimanjojo/talhelper" = "3.1.7"
"aqua:derailed/k9s" = "0.50.18"
"aqua:FiloSottile/age" = { version = "1.3.1", completions = false }
"aqua:fluxcd/flux2" = "2.8.3"
"aqua:getsops/sops" = { version = "3.12.2", completions = false }
"aqua:go-task/task" = { version = "3.49.1", completions = true, completion_flag = "--completion" }
"aqua:jqlang/jq" = { version = "1.8.1", completions = false }
"aqua:kubernetes/kubectl" = "1.34.3"
"aqua:siderolabs/talos" = "1.12.6"
"aqua:utkuozdemir/pv-migrate" = "3.1.0"
"aqua:helm/helm" = "4.1.3"
"aqua:helmfile/helmfile" = "1.4.3"
"aqua:kubernetes-sigs/kustomize" = "5.8.0"
"aqua:mikefarah/yq" = { version = "4.52.5", completions = false }
"aqua:cilium/cilium-cli" = "0.19.2"
"aqua:cloudflare/cloudflared" = { version = "2026.3.0", completions = false }
"github:grafana/mcp-grafana" = { version = "0.11.3", completions = false }
"github:cloudnative-pg/cloudnative-pg" = "1.28.1"
"github:Handfish/talos-pilot" = { version = "0.1.9", completions = false }
"aqua:opentofu" = { version = "1.11.5", completions = false }
"pipx:copier" = { version = "9.14.0", completions = false, uvx_args = "--with copier-template-extensions" }
"pipx:flux-local" = { version = "8.1.0", completions = false }
"cargo:kanidm_tools" = { version = "1.9.1", completions = false }
"aqua:gruntwork-io/terragrunt" = { version = "0.99.5", completion_flag = "--install-autocomplete" }
"asdf:mise-plugins/mise-oci" = "3.75.0"
