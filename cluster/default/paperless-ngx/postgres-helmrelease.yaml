apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: paperless-postgres
  namespace: default
spec:
  interval: 10m
  chart:
    spec:
      chart: postgresql
      sourceRef:
        kind: HelmRepository
        name: bitnami
      version: "14.1.1"
  values:
    auth:
      username: ${POSTGRES_USERNAME}
      password: ${POSTGRES_PASSWORD}
      database: ${POSTGRES_DATABASE}
  valuesFrom:
    - kind: ConfigMap
      name: paperless-postgres-config
    - kind: Secret
      name: paperless-secrets
