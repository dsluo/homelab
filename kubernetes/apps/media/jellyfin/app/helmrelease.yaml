---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: jellyfin
spec:
  chartRef:
    kind: OCIRepository
    name: jellyfin
  interval: 1h
  values:
    controllers:
      jellyfin:
        annotations:
          reloader.stakater.com/auto: "true"

        pod:
          resourceClaims:
            - name: gpu
              resourceClaimTemplateName: jellyfin
          securityContext:
            runAsNonRoot: true
            runAsUser: 4006
            runAsGroup: 4006
            supplementalGroups: [5001]

        initContainers:
          install-sso-plugin:
            image:
              repository: busybox
              tag: 1.37.0
              digest: sha256:70ce0a747f09cd7c09c2d6eaeab69d60adb0398f569296e8c0e844599388ebd6
            command:
              - sh
              - -c
              - |
                PLUGIN_DIR=/config/data/plugins/SSO-Auth
                # renovate: datasource=github-releases depName=9p4/jellyfin-plugin-sso
                PLUGIN_URL="https://github.com/9p4/jellyfin-plugin-sso/releases/download/v4.0.0.3/sso-authentication_4.0.0.3.zip"
                mkdir -p "$PLUGIN_DIR"
                wget -O /tmp/sso-plugin.zip "$PLUGIN_URL"
                unzip -o /tmp/sso-plugin.zip -d "$PLUGIN_DIR"
                rm /tmp/sso-plugin.zip

        containers:
          jellyfin:
            image:
              repository: ghcr.io/jellyfin/jellyfin
              tag: 10.11.6
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 5
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                memory: 2Gi
              claims:
                - name: gpu
    service:
      jellyfin:
        controller: jellyfin
        primary: true
        ports:
          http:
            port: 8096
    route:
      jellyfin:
        hostnames:
          - "jellyfin.${SECRET_DOMAIN}"
        parentRefs:
          - name: envoy-internal
            namespace: network
        rules:
          - backendRefs:
              - identifier: jellyfin
                port: http

    persistence:
      config:
        existingClaim: jellyfin
        globalMounts:
          - path: /config
      media:
        type: nfs
        path: /mnt/tank/media/media
        server: storage.lan
        advancedMounts:
          jellyfin:
            jellyfin:
              - path: /media
                readOnly: true
      cache:
        type: emptyDir
        globalMounts:
          - path: /cache
