---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: grafana-operator
spec:
  interval: 1h
  path: ./kubernetes/apps/observability/grafana/operator
  postBuild:
    substituteFrom:
      - name: cluster-secrets
        kind: Secret
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: observability
  wait: false
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: grafana-oidc
spec:
  dependsOn:
    - name: pocket-id
      namespace: security
  interval: 1h
  path: ./kubernetes/components/oidc
  postBuild:
    substitute:
      APP: grafana
      APP_ICON_URL: "https://cdn.jsdelivr.net/gh/selfhst/icons@main/svg/grafana.svg"
      OIDC_PKCE_ENABLED: "true"
    substituteFrom:
      - name: cluster-secrets
        kind: Secret
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: observability
  healthChecks:
    - apiVersion: v1
      kind: Secret
      name: grafana-oidc-credentials
      namespace: observability
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app grafana-instance
spec:
  dependsOn:
    - name: grafana-operator
    - name: grafana-oidc
    - name: volsync
      namespace: volsync-system
  interval: 1h
  path: ./kubernetes/apps/observability/grafana/instance
  components:
    - ../../../../components/volsync
  postBuild:
    substitute:
      APP: *app
      VOLSYNC_CAPACITY: 5Gi
    substituteFrom:
      - name: cluster-secrets
        kind: Secret
      - name: grafana-oidc-credentials
        kind: Secret
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: observability
  wait: false
