---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app llama-cpp
spec:
  chartRef:
    kind: OCIRepository
    name: *app
  interval: 1h
  values:
    controllers:
      ? *app
      : annotations:
          reloader.stakater.com/auto: "true"
        pod:
          resourceClaims:
            - name: gpu
              resourceClaimTemplateName: *app
        initContainers:
          download-models:
            image:
              repository: ghcr.io/astral-sh/uv
              tag: python3.14-alpine
            env:
              HUGGINGFACE_HUB_CACHE: /models
              HF_TOKEN:
                valueFrom:
                  secretKeyRef:
                    name: llama-cpp-secret
                    key: HF_TOKEN
            command:
              - /bin/sh
              - -ec
              - |
                uv pip install --system --no-cache huggingface_hub
                for ref in \
                  unsloth/gemma-4-E4B-it-GGUF:UD-Q8_K_XL
                do
                  download-model "$ref"
                done

        containers:
          ? *app
          : image:
              repository: ghcr.io/ggml-org/llama.cpp
              tag: server-intel@sha256:ffc326554be29a3b79aeb0b204379d61c6bec0fb70ef45f42aabcf71242b6b7a
            command:
              - --models-preset
              - &presetFile /config/presets.ini
            env:
              LLAMA_ARG_HOST: 0.0.0.0
              LLAMA_ARG_PORT: &port 8080
              LLAMA_API_KEY:
                valueFrom:
                  secretKeyRef:
                    name: llama-cpp-secret
                    key: LLAMA_API_KEY
              LLAMA_OFFLINE: 1
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                memory: 2Gi
              claims:
                - name: gpu
    service:
      ? *app
      : ports:
          http:
            port: *port
    route:
      ? *app
      : hostnames:
          - "llama.${SECRET_DOMAIN}"
        parentRefs:
          - name: envoy-internal
            namespace: network
        rules:
          - backendRefs:
              - identifier: *app
                port: *port
    persistence:
      config:
        type: configMap
        name: llama-cpp-config
        globalMounts:
          - path: *presetFile
            subPath: presets.ini
            readOnly: true
      download-script:
        type: configMap
        name: llama-cpp-download-script
        defaultMode: 0o755
        advancedMounts:
          ? *app
          : download-models:
              - path: /usr/bin/download-model
                subPath: download-model.sh
                readOnly: true
      models:
        existingClaim: *app
        advancedMounts:
          ? *app
          : ? *app
            : - path: /models
                readOnly: true
            download-models:
              - path: /models
                readOnly: false
      tmpfs:
        type: emptyDir
        globalMounts:
          - path: /tmp
