---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app paperless
spec:
  dependsOn:
    - name: pocket-id
      namespace: security
    - name: kopiur-repository
      namespace: kopiur-system
  interval: 1h
  path: ./kubernetes/apps/documents/paperless/app
  components:
    - ../../../../components/database
    - ../../../../components/oidc
    - ../../../../components/kopiur
  postBuild:
    substitute:
      APP: *app
      APP_ICON_URL: "https://cdn.jsdelivr.net/gh/selfhst/icons@main/svg/paperless-ngx.svg"
      OIDC_APP_NAME: Paperless
      OIDC_PKCE_ENABLED: "true"
      OIDC_CALLBACK_PATH: /accounts/oidc/pocket-id/login/callback/
      KOPIUR_CAPACITY: 10Gi
      KOPIUR_UID: "4001"
      KOPIUR_GID: "4001"
    substituteFrom:
      - name: cluster-secrets
        kind: Secret
      - name: paperless-oidc-credentials
        kind: Secret
        optional: true
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: documents
  wait: false
