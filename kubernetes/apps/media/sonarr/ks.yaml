---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app sonarr
spec:
  dependsOn:
    - name: pocket-id
      namespace: security
    - name: volsync
      namespace: volsync-system
  components:
    - ../../../../components/database
    - ../../../../components/oidc/envoy
    - ../../../../components/volsync
  interval: 1h
  path: ./kubernetes/apps/media/sonarr/app
  postBuild:
    substitute:
      APP: *app
      APP_ICON_URL: "https://cdn.jsdelivr.net/gh/selfhst/icons@main/svg/sonarr.svg"
      OIDC_APP_NAME: Sonarr
      VOLSYNC_CAPACITY: 5Gi
      VOLSYNC_UID: "4007"
      VOLSYNC_GID: "4007"
    substituteFrom:
    - name: cluster-secrets
      kind: Secret
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: media
  wait: false
