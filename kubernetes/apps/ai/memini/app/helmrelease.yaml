---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app memini
spec:
  chartRef:
    kind: OCIRepository
    name: *app
  interval: 1h
  values:
    fullnameOverride: *app
    controllers:
      main:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          main:
            env:
              MEMINI_BACKEND: sqlite
              MEMINI_LOG_FORMAT: json
              MEMINI_EMBED_BASE_URL: http://all-minilm-l6-v2.ai.svc.cluster.local:8080/v1
              MEMINI_EMBED_MODEL: sentence-transformers/all-MiniLM-L6-v2
              MEMINI_EMBED_DIMS: "384"
              MEMINI_RERANK: http://qwen3-reranker-0.6b.ai.svc.cluster.local:8080/v1
              MEMINI_RERANK_MODEL: qwen3-reranker-0.6b
              MEMINI_RERANK_TOP_N: "20"
              MEMINI_RERANK_MAX_DOC_CHARS: "4000"
              MEMINI_API_KEY:
                valueFrom:
                  secretKeyRef:
                    name: memini-secret
                    key: MEMINI_API_KEY
            resources:
              requests:
                cpu: 25m
                memory: 128Mi
              limits:
                memory: 512Mi
    persistence:
      data:
        existingClaim: *app
    route:
      internal:
        enabled: true
        hostnames:
          - "memini.${SECRET_DOMAIN}"
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
