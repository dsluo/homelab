---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app continuwuity
spec:
  chartRef:
    kind: OCIRepository
    name: *app
  interval: 1h
  values:
    defaultPodOptions:
      automountServiceAccountToken: false
      enableServiceLinks: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: { type: "RuntimeDefault" }
      dnsConfig:
        options:
          - name: ndots
            value: "1"
    controllers:
      *app :
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          *app :
            image:
              repository: forgejo.ellis.link/continuwuation/continuwuity
              tag: v0.5.10-maxperf@sha256:137c3ec3145beab4f826f63c8fe44347002400ed115d42c0450d49d9bf6fe16f
            securityContext:
              readOnlyRootFilesystem: true
              allowPrivilegeEscalation: false
              capabilities:
                drop: ["ALL"]
            env:
              # --- Runtime ---
              TZ: "America/Detroit"
              CONTINUWUITY_CONFIG_RELOAD_SIGNAL: true
              CONTINUWUITY_ALLOW_ANNOUNCEMENTS_CHECK: true
              CONTINUWUITY_ADDRESS:
                valueFrom:
                  fieldRef:
                    apiVersion: v1
                    fieldPath: status.podIP
              CONTINUWUITY_PORT: &port 8080
              CONTINUWUITY_DATABASE_PATH: &db /database

              # --- Server identity & delegation ---
              CONTINUWUITY_SERVER_NAME: crayon.club
              CONTINUWUITY_WELL_KNOWN__CLIENT: "https://matrix.crayon.club"
              CONTINUWUITY_WELL_KNOWN__SERVER: "federation.crayon.club:443" 
              # CONTINUWUITY_WELL_KNOWN__SUPPORT_EMAIL: ""

              # --- DNS resolution (CoreDNS) ---
              CONTINUWUITY_QUERY_OVER_TCP_ONLY: true
              CONTINUWUITY_IP_LOOKUP_STRATEGY: 1 # ipv4 only

              # --- Registration ---
              CONTINUWUITY_ALLOW_REGISTRATION: true
              CONTINUWUITY_SUSPEND_ON_REGISTER: true
              CONTINUWUITY_NEW_USER_DISPLAYNAME_SUFFIX: ""

              # --- Federation & encryption ---
              CONTINUWUITY_ALLOW_ENCRYPTION: true
              CONTINUWUITY_ALLOW_FEDERATION: true
              CONTINUWUITY_QUERY_TRUSTED_KEY_SERVERS_FIRST: false
              CONTINUWUITY_QUERY_TRUSTED_KEY_SERVERS_FIRST_ON_JOIN: false

              # --- Privacy & abuse hardening ---
              CONTINUWUITY_ALLOW_LEGACY_MEDIA: false
              CONTINUWUITY_FORGET_FORCED_UPON_LEAVE: true
              CONTINUWUITY_REQUIRE_AUTH_FOR_PROFILE_REQUESTS: true
              CONTINUWUITY_ALLOW_PUBLIC_ROOM_DIRECTORY_WITHOUT_AUTH: false
              CONTINUWUITY_ALLOW_PUBLIC_ROOM_DIRECTORY_OVER_FEDERATION: false
              CONTINUWUITY_LOCKDOWN_PUBLIC_ROOM_DIRECTORY: true

            envFrom:
              - secretRef:
                  name: continuwuity-secret

            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /_matrix/federation/v1/version
                    port: *port
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 3
                  failureThreshold: 3
              readiness: *probes
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /_matrix/federation/v1/version
                    port: *port
                  periodSeconds: 5
                  failureThreshold: 30
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                memory: 2Gi

    service:
      *app :
        ports:
          http:
            port: *port

    route:
      *app :
        hostnames:
          - "matrix.${SECRET_DOMAIN}"
        parentRefs:
          - name: envoy-cloudflare
            namespace: network
        rules:
          - backendRefs:
              - identifier: *app
                port: *port
      federation:
        hostnames:
          - "federation.${SECRET_DOMAIN}"
        parentRefs:
          - name: envoy-cloudflare
            namespace: network
        rules:
          - backendRefs:
              - identifier: *app
                port: *port
      well-known:
        hostnames:
          - "${SECRET_DOMAIN}"
        parentRefs:
          - name: envoy-cloudflare
            namespace: network
        rules:
          - matches:
              - path:
                  type: PathPrefix
                  value: /.well-known/matrix/
            backendRefs:
              - identifier: *app
                port: *port
    persistence:
      database:
        existingClaim: *app
        globalMounts:
          - path: *db
      tmp:
        type: emptyDir
