---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app bazaar
spec:
  dependsOn:
    - name: volsync
      namespace: volsync-system
  components:
    - ../../../../components/volsync
  interval: 1h
  path: ./kubernetes/apps/media/bazaar/app
  postBuild:
    substitute:
      APP: *app
      VOLSYNC_CAPACITY: 5Gi
    substituteFrom:
      - name: cluster-secrets
        kind: Secret
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: media
  wait: false
