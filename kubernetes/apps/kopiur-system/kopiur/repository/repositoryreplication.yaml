---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kopiur.home-operations.com/repositoryreplication_v1alpha1.json
apiVersion: kopiur.home-operations.com/v1alpha1
kind: RepositoryReplication
metadata:
  name: homelab-offsite
spec:
  sourceRef:
    kind: ClusterRepository
    name: homelab
  destination:
    # B2 via its S3-compatible API: kopia's native b2 provider is deprecated
    # and Backblaze now rejects its old native-API calls ("not currently
    # supported on API version number 1" — first scheduled sync, 2026-07-13).
    # The same application key works; the secret carries it under the S3 names
    # (AWS_ACCESS_KEY_ID/AWS_SECRET_ACCESS_KEY) alongside the legacy B2_* keys.
    s3:
      bucket: crayon-club-backups
      prefix: kopia/
      endpoint: s3.us-west-000.backblazeb2.com
      region: us-west-000
      auth:
        secretRef:
          name: kopiur-repository-secret
  schedule:
    # Daily offsite sync of the hourly snapshots. Planned follow-up: flip the
    # topology so B2 is the primary repository and TrueNAS the replica.
    cron: H 10 * * *
  sync:
    # kopia sync-to defaults to one blob at a time; without this the initial
    # seed to B2 would take days.
    parallel: 8
