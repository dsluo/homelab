---
clusterName: homelab

talosVersion: v1.13.5
# renovate: datasource=docker depName=ghcr.io/siderolabs/kubelet
kubernetesVersion: v1.36.2

endpoint: https://10.0.42.3:6443
allowSchedulingOnControlPlanes: true
clusterPodNets:
  - 10.244.0.0/16
clusterSvcNets:
  - 10.96.0.0/12

# Disable built-in CNI to use Cilium
cniConfig:
  name: none

nodes:
  - hostname: talos0
    ipAddress: "10.0.42.3"
    nameservers: &dns
      - 10.0.42.1
    controlPlane: true
    machineSpec:
      secureboot: true
    nodeLabels:
      intel.feature.node.kubernetes.io/gpu: "true"
    installDiskSelector:
      size: "960197124096"
      model: "SAMSUNG*"
    kernelModules:
      - name: zfs
    schematic:
      customization:
        systemExtensions:
          officialExtensions:
            - siderolabs/intel-ucode
            - siderolabs/mei
            - siderolabs/util-linux-tools
            - siderolabs/xe
            - siderolabs/zfs
        bootloader: sd-boot
    # todo: state and ephemeral disk encryption
    volumes:
      - name: EPHEMERAL
        provisioning:
          diskSelector:
            match: disk.pretty_size == "960 GB" && disk.model.startsWith("SAMSUNG")
          maxSize: 100GB
    networkInterfaces:
      - interface: bond0
        bond:
          interfaces:
            - enp1s0f0np0
            - enp1s0f1np1
          mode: active-backup
        mtu: 1500
        vlans:
          - vlanId: 42
            dhcp: false
            addresses:
              - "10.0.42.3/24"
            routes:
              - network: "0.0.0.0/0"
                gateway: "10.0.42.1"
            # vip:
            #   ip: "10.0.42.2"
    patches:
      - |-
        apiVersion: v1alpha1
        kind: RawVolumeConfig
        name: openebs-zpool
        provisioning:
          diskSelector:
            match: disk.pretty_size == "960 GB" && disk.model.startsWith("SAMSUNG")
          minSize: "500GB"
          grow: true
      - |-
        apiVersion: v1alpha1
        kind: UserVolumeConfig
        name: local-hostpath
        volumeType: directory
      - |-
        apiVersion: v1alpha1
        kind: EthernetConfig
        name: enp4s0
        wakeOnLan:
          - magic
  - hostname: talos1
    ipAddress: 10.0.42.4
    nameservers: *dns
    controlPlane: false
    machineSpec:
      secureboot: true
    installDiskSelector:
      size: ">= 1TB"
      model: "Samsung*"
    kernelModules:
      - name: zfs
      - name: nvidia
      - name: nvidia_uvm
      - name: nvidia_drm
      - name: nvidia_modeset
    schematic:
      customization:
        systemExtensions:
          officialExtensions:
            - siderolabs/amd-ucode
            # gVisor (runsc) container runtime — sandboxes the openclaw agent
            # pod (RuntimeClass "gvisor") so untrusted/injected agent code is
            # confined to a userspace kernel instead of the host kernel.
            - siderolabs/gvisor
            - siderolabs/nvidia-container-toolkit-production
            - siderolabs/nvidia-open-gpu-kernel-modules-production
            - siderolabs/util-linux-tools
            - siderolabs/zfs
        bootloader: sd-boot
    volumes:
      - name: EPHEMERAL
        provisioning:
          diskSelector:
            match: disk.pretty_size >= "1 TB" && disk.model.startsWith("Samsung")
          maxSize: 100GB
    networkInterfaces:
      - interface: enp16s0f1
        mtu: 1500
        vlans:
          - vlanId: 42
            dhcp: false
            addresses:
              - "10.0.42.4/24"
            routes:
              - network: "0.0.0.0/0"
                gateway: 10.0.42.1
            # vip:
            #   ip: "10.0.42.2"
    patches:
      - |-
        apiVersion: v1alpha1
        kind: RawVolumeConfig
        name: openebs-zpool
        provisioning:
          diskSelector:
            match: disk.pretty_size >= "1 TB" && disk.model.startsWith("Samsung")
          minSize: "500GB"
          grow: true
      - |-
        apiVersion: v1alpha1
        kind: UserVolumeConfig
        name: local-hostpath
        volumeType: directory
      - |-
        apiVersion: v1alpha1
        kind: EthernetConfig
        name: enp14s0
        wakeOnLan:
          - magic
      - |-
        # gVisor (runsc) requires unprivileged user namespaces to build its
        # sandbox; Talos defaults user.max_user_namespaces to 0 (disabled).
        # Scoped to talos1, the only node with the gVisor extension and where
        # the openclaw agent pod is pinned. (Lowers a KSPP hardening default.)
        machine:
          sysctls:
            user.max_user_namespaces: "11255"

patches:
  - |-
    machine:
      files:
        - path: /etc/cri/conf.d/20-customization.part
          op: create
          content: |
            [plugins."io.containerd.cri.v1.runtime"]
              cdi_spec_dirs = ["/var/cdi/static", "/var/cdi/dynamic"]
              device_ownership_from_security_context = true

controlPlane:
  patches:
    - |-
      machine:
        features:
          kubernetesTalosAPIAccess:
            allowedKubernetesNamespaces:
              - system-upgrade
            allowedRoles:
              - os:admin
            enabled: true
    - |-
      cluster:
        # Disable built-in CoreDNS to use Helm-managed CoreDNS
        coreDNS:
          disabled: true

        # Disable kube-proxy since Cilium replaces it
        proxy:
          disabled: true

        # Enable MutatingAdmissionPolicy (and friends)
        apiServer:
          extraArgs:
            feature-gates: MutatingAdmissionPolicy=true
            runtime-config: admissionregistration.k8s.io/v1beta1=true

        # Expose controller manager metrics for Prometheus scraping
        controllerManager:
          extraArgs:
            bind-address: "0.0.0.0"

        # Expose scheduler metrics for Prometheus scraping
        scheduler:
          extraArgs:
            bind-address: "0.0.0.0"

        # Expose etcd metrics for Prometheus scraping on port 2381
        etcd:
          extraArgs:
            listen-metrics-urls: http://0.0.0.0:2381
