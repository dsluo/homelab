# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/barmancloud.cnpg.io/objectstore_v1.json
apiVersion: barmancloud.cnpg.io/v1
kind: ObjectStore
metadata:
  name: garage
spec:
  configuration:
    destinationPath: s3://cnpg/
    endpointURL: "${GARAGE_ENDPOINT_URL}"
    s3Credentials:
      accessKeyId:
        name: &secret garage-cnpg
        key: ACCESS_KEY_ID
      secretAccessKey:
        name: *secret
        key: SECRET_ACCESS_KEY
    wal:
      compression: zstd
      maxParallel: 8
    data:
      compression: gzip
  retentionPolicy: 15d
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/barmancloud.cnpg.io/objectstore_v1.json
apiVersion: barmancloud.cnpg.io/v1
kind: ObjectStore
metadata:
  name: backblaze
spec:
  configuration:
    destinationPath: s3://crayon-club-backups/cnpg
    endpointURL: "https://s3.us-west-000.backblazeb2.com"
    s3Credentials:
      accessKeyId:
        name: &secret b2-cnpg
        key: ACCESS_KEY_ID
      secretAccessKey:
        name: *secret
        key: SECRET_ACCESS_KEY
    wal:
      compression: zstd
      maxParallel: 8
    data:
      compression: gzip
  retentionPolicy: 15d
