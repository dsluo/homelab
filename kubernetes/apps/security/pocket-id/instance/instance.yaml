# yaml-language-server: $schema=https://raw.githubusercontent.com/aclerici38/pocket-id-operator/refs/heads/main/dist/schemas/pocketidinstance_v1alpha1.json
apiVersion: pocketid.internal/v1alpha1
kind: PocketIDInstance
metadata:
  name: &name pocket-id
spec:
  annotations:
    reloader.stakater.com/auto: "true"
  image: ghcr.io/pocket-id/pocket-id:v2.3.0-distroless@sha256:85a7485108325e34679b0fbca0baeb8418401f6d6cf59944d50f3ec013aafd09
  versionCheckDisabled: true
  env:
    - name: TZ
      value: America/Detroit

  analyticsDisabled: true

  encryptionKey:
    valueFrom:
      secretKeyRef:
        name: pocket-id-secret
        key: ENCRYPTION_KEY
  databaseUrl:
    valueFrom:
      secretKeyRef:
        name: pocket-id-secret
        key: databaseUrl
  hostUsers: false
  fileBackend: database

  persistence:
    enabled: false

  logging:
    level: info
    json: false
  # todo: service monitor for this
  metrics:
    enabled: true

  auditLogRetentionDays: 180

  appUrl: "https://pocket-id.${SECRET_DOMAIN}"
  route:
    enabled: true
    parentRefs:
      - name: envoy-internal
        namespace: network
    hostnames: ["pocket-id.${SECRET_DOMAIN}"]
